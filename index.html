<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아크라시아 컵 : 로드 투 챔피언</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #05070a;
            --card-bg: rgba(15, 20, 30, 0.95);
            --accent: #d4ad6a;
            --accent-bright: #f5c842;
            --text-main: #e8eaf0;
            --text-dim: #9ca3af;
            --error: #ff4d4d;
            --win: #2ecc71;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: var(--bg-dark); color: var(--text-main); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; overflow-x: hidden; }
        #app { max-width: 500px; margin: 0 auto; position: relative; padding-bottom: 40px; }

        .top-util { display: flex; justify-content: space-between; padding: 15px 20px; }
        .day-badge { background: rgba(212, 173, 106, 0.1); padding: 4px 10px; border-radius: 4px; border: 1px solid var(--accent); color: var(--accent); font-weight: 800; font-size: 12px; }
        .next-day-btn { background: var(--accent); color: #000; padding: 4px 10px; border-radius: 4px; border: none; font-weight: 800; cursor: pointer; font-size: 12px; }

        .header { text-align: center; padding: 20px 20px 10px; }
        .event-badge { display: inline-block; font-size: 11px; font-weight: 800; letter-spacing: 2px; padding: 4px 14px; border-radius: 4px; margin-bottom: 12px; background: var(--accent); color: #000; }
        h1 { font-size: 24px; font-weight: 900; color: #fff; text-shadow: 0 0 15px rgba(212, 173, 106, 0.3); }

        .tabs { display: grid; grid-template-columns: repeat(3, 1fr); margin: 15px 16px; background: rgba(255,255,255,0.05); border-radius: 12px; padding: 4px; }
        .tab-btn { background: transparent; border: none; padding: 12px; color: var(--text-dim); font-weight: 700; font-size: 13px; cursor: pointer; }
        .tab-btn.active { background: var(--accent); color: #000; border-radius: 8px; }

        .panel { display: none; padding: 0 16px; animation: fadeIn 0.3s ease; }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card-bg); border: 1px solid rgba(212, 173, 106, 0.2); border-radius: 16px; padding: 18px; margin-bottom: 16px; position: relative; }
        .card-title { font-size: 13px; font-weight: 800; color: var(--accent); margin-bottom: 15px; text-transform: uppercase; }

        .btn { width: 100%; padding: 16px; border-radius: 12px; font-weight: 800; border: none; cursor: pointer; font-size: 15px; transition: all 0.2s; }
        .btn-primary { background: linear-gradient(135deg, var(--accent), #b89156); color: #000; }
        .btn:disabled { background: #222 !important; color: #555 !important; cursor: not-allowed; opacity: 0.5; }

        /* 결과 알림 오버레이 */
        #matchOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            backdrop-filter: blur(5px);
        }
        #matchOverlay.show { display: flex; animation: zoomIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        
        .result-title { font-size: 60px; font-weight: 900; letter-spacing: -2px; margin-bottom: 10px; text-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .result-sub { font-size: 18px; font-weight: 700; color: var(--text-dim); }
        .win-text { color: var(--win); text-shadow: 0 0 30px rgba(46, 204, 113, 0.4); }
        .lose-text { color: var(--error); text-shadow: 0 0 30px rgba(255, 77, 77, 0.4); }

        /* 공통 전력 그래프 스타일 */
        .stat-container { text-align: center; margin-bottom: 20px; }
        .radar-box { position: relative; width: 180px; height: 180px; margin: 0 auto; }
        
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); opacity: 0; transition: 0.3s; background: rgba(0,0,0,0.9); border: 1px solid var(--accent); padding: 12px 24px; border-radius: 30px; z-index: 1000; color: #fff; pointer-events: none; }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }

        .bracket-container { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
        .bracket-node { width: 36px; height: 36px; border-radius: 50%; background: #1a1f26; border: 2px solid #333; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 11px; z-index: 2; color: #555; }
        .bracket-node.active { background: var(--accent); border-color: var(--accent-bright); color: #000; box-shadow: 0 0 15px rgba(212, 173, 106, 0.4); }
        .bracket-node.complete { background: var(--win); border-color: var(--win); color: #fff; }

        .train-list-item { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            padding: 14px; border-radius: 12px; display: flex; justify-content: space-between; 
            align-items: center; margin-bottom: 10px; cursor: pointer; transition: 0.2s;
        }
        .train-list-item:active { transform: scale(0.98); background: rgba(212, 173, 106, 0.1); }
    </style>
</head>
<body>
    <div id="matchOverlay" onclick="closeOverlay()">
        <div id="resultTitle" class="result-title">WIN</div>
        <div id="resultSub" class="result-sub">다음 라운드 진출!</div>
        <div style="margin-top: 30px; font-size: 12px; color: #666;">화면을 클릭하여 닫기</div>
    </div>

    <div id="app">
        <div class="top-util">
            <div class="day-badge" id="currentDayLabel">DAY 1</div>
            <button class="next-day-btn" onclick="nextDay()">다음 날로 넘기기 ➔</button>
        </div>

        <div class="header">
            <div class="event-badge">ROAD TO CHAMPION</div>
            <h1 id="mainTitle">아크라시아 컵</h1>
        </div>

        <div class="tabs" id="mainTabs" style="display:none;">
            <button class="tab-btn active" id="tab-profile-btn" onclick="switchTab('profile', this)">팀 관리</button>
            <button class="tab-btn" id="tab-training-btn" onclick="switchTab('training', this)">훈련</button>
            <button class="tab-btn" id="tab-match-btn" onclick="switchTab('match', this)">대회</button>
        </div>

        <div class="panel active" id="panel-profile">
            <div id="selectionArea">
                <div class="card-title">원정대 팀 선택</div>
                <div id="teamGrid"></div>
                <button class="btn btn-primary" id="confirmBtn" onclick="confirmTeam()" style="display:none; margin-top:10px;">팀 계약 체결</button>
            </div>
            <div id="teamInfoArea" style="display:none;">
                <div class="card" style="text-align:center;">
                    <div class="card-title">📊 팀 종합 전력</div>
                    <div class="radar-box"><svg id="radarSvgProfile" width="180" height="180" viewBox="0 0 200 200"></svg></div>
                    <div id="totalStatsTextProfile" style="font-size:16px; margin-top:10px; color:var(--accent-bright); font-weight:800;"></div>
                </div>
            </div>
        </div>

        <div class="panel" id="panel-training">
            <div class="card" style="text-align:center;">
                <div class="card-title">실시간 성장 그래프</div>
                <div class="radar-box"><svg id="radarSvgTrain" width="180" height="180" viewBox="0 0 200 200"></svg></div>
                <div id="totalStatsTextTrain" style="font-size:14px; margin-top:5px; color:var(--accent-bright); font-weight:800;"></div>
                <div style="font-size:11px; color:var(--text-dim); margin-top:10px;">남은 포인트: <span id="tpLabel" style="color:var(--accent); font-weight:800;">0P</span></div>
            </div>
            <div id="trainMenu"></div>
        </div>

        <div class="panel" id="panel-match">
            <div class="card">
                <div class="card-title" id="currentLeagueName">진행 현황</div>
                <div class="bracket-container">
                    <div class="bracket-node" id="node-1">8</div>
                    <div class="bracket-node" id="node-2">4</div>
                    <div class="bracket-node" id="node-3">2</div>
                    <div class="bracket-node" id="node-4">🏆</div>
                </div>
            </div>
            <div id="matchCard" class="card">
                <div style="text-align:center; padding:10px;">
                    <div id="myTeamLabel" style="font-weight:800; font-size:16px;">우리팀</div>
                    <div style="color:var(--accent); font-weight:900; margin:5px 0; font-size:12px;">VS</div>
                    <div id="enemyTeamLabel" style="font-weight:800; font-size:18px; color:var(--error);">상대팀</div>
                </div>
                <button class="btn btn-primary" id="matchBtn" onclick="playMatch()" style="margin-top:15px;">경기 시작</button>
                <div id="failMessage" class="status-msg fail" style="display:none; margin-top:10px; color:var(--error); font-size:12px; text-align:center;">오늘은 더 이상 경기를 치를 수 없습니다.</div>
            </div>
            <div id="waitMessage" class="card" style="display:none; text-align:center; padding:30px 10px;">
                <div style="font-weight:800; color:var(--accent-bright); font-size:18px;">리그 우승!</div>
                <div style="font-size:12px; color:var(--text-dim); margin-top:5px;">다음 리그를 위해 날짜를 넘겨주세요.</div>
            </div>
        </div>
    </div>
    <div id="toast"></div>

<script>
const TEAMS_DATA = {
    "베른 유나이티드": { captain: "에아달린", players: ["라하르트", "아델", "제레온"] },
    "아르데타인 스틸러스": { captain: "바스티안", players: ["사샤", "카인", "마리 파우렌츠"] },
    "루테란 FC": { captain: "미한", players: ["하셀링크", "하울로크", "칼스"] },
    "엘가시아 CF": { captain: "라우리엘", players: ["아자키엘", "티엔", "프리우나"] },
    "SSC 볼다이크": { captain: "세헤라데", players: ["마레가", "아이작", "마리우"] }
};

const LEAGUES = [
    { name: "1차 예선", M: 480, N: 960, enemies: ["레온하트 네리아","슈테른 네리아","칸다리아 네리아"] },
    { name: "2차 예선", M: 960, N: 1440, enemies: ["판다 푸푸","나루니","코니"] },
    { name: "3차 예선", M: 1440, N: 1920, enemies: ["발탄","비아키스","카멘"] },
    { name: "아크라시아 컵", M: 2200, N: 2400, enemies: ["니나브","카단","실리안"] }
];

const TRAINS = [
    { id:'t1', name:"기초 체력", cost:20, stats:['체력','속도'] },
    { id:'t2', name:"전술 훈련", cost:20, stats:['수비','협력'] },
    { id:'t3', name:"슈팅 훈련", cost:20, stats:['공격','기술'] },
    { id:'t4', name:"비디오 분석", cost:30, stats:['공격','협력','기술'] },
    { id:'t5', name:"단체 명상", cost:30, stats:['수비','체력','속도'] },
    { id:'t6', name:"전문 강사 초청", cost:60, stats:['공격','수비','협력','기술','체력','속도'] }
];

let ST = {
    day: 1, tp: 100, leagueIdx: 0, round: 1, 
    selectedTeamName: null, players: [], enemy: null, 
    isLeagueCleared: false, isFailed: false, curProb: 0 
};

function init() {
    const grid = document.getElementById('teamGrid');
    grid.innerHTML = Object.keys(TEAMS_DATA).map(name => `
        <div class="train-list-item" id="team-${name}" onclick="ST.selectedTeamName='${name}'; renderSelection();">
            <b>${name}</b><span style="color:var(--accent); font-size:11px;">${TEAMS_DATA[name].captain}</span>
        </div>
    `).join('');
    
    const tMenu = document.getElementById('trainMenu');
    tMenu.innerHTML = TRAINS.map(t => `
        <div class="train-list-item" onclick="doTrain('${t.id}')">
            <div><div style="font-weight:800;">${t.name}</div><div style="font-size:10px; color:var(--text-dim);">${t.stats.join(', ')}</div></div>
            <div style="color:var(--accent-bright); font-weight:800;">${t.cost}P</div>
        </div>
    `).join('');
}

function renderSelection() {
    document.querySelectorAll('[id^="team-"]').forEach(el => el.style.borderColor = 'rgba(255,255,255,0.1)');
    document.getElementById(`team-${ST.selectedTeamName}`).style.borderColor = 'var(--accent)';
    document.getElementById('confirmBtn').style.display = 'block';
}

function confirmTeam() {
    const data = TEAMS_DATA[ST.selectedTeamName];
    const posSet = [{p:'FW', s:['공격','속도','기술']},{p:'MF', s:['공격','협력','기술']},{p:'DF', s:['수비','협력','체력']},{p:'GK', s:['수비','체력','속도']}];
    ST.players = [data.captain, ...data.players].map((n, i) => ({
        name: n, pos: posSet[i].p, target: posSet[i].s, stats: {'공격':40,'수비':40,'협력':40,'기술':40,'체력':40,'속도':40}
    }));
    ST.enemy = LEAGUES[ST.leagueIdx].enemies[0];
    document.getElementById('selectionArea').style.display = 'none';
    document.getElementById('mainTabs').style.display = 'grid';
    document.getElementById('teamInfoArea').style.display = 'block';
    render();
}

function calculateTotals() {
    let teamTotals = { '공격':0,'수비':0,'협력':0,'기술':0,'체력':0,'속도':0 };
    ST.players.forEach(p => { p.target.forEach(sName => { teamTotals[sName] += p.stats[sName]; }); });
    const S = Object.values(teamTotals).reduce((a,b)=>a+b, 0);
    return { t: teamTotals, S: S };
}

function render() {
    if (!ST.players.length) return;
    const { t, S } = calculateTotals();
    const league = LEAGUES[ST.leagueIdx];
    
    // UI 텍스트 갱신
    document.getElementById('currentDayLabel').innerText = `DAY ${ST.day}`;
    document.getElementById('tpLabel').innerText = `${ST.tp}P`;
    document.getElementById('totalStatsTextProfile').innerText = `전투력 ${S}`;
    document.getElementById('totalStatsTextTrain').innerText = `현재 전투력 ${S}`;
    document.getElementById('myTeamLabel').innerText = ST.selectedTeamName;
    document.getElementById('enemyTeamLabel').innerText = ST.enemy;
    document.getElementById('currentLeagueName').innerText = `${league.name} 진행 중`;

    // 방사형 그래프 두 곳 모두 업데이트
    drawRadar('radarSvgProfile', t);
    drawRadar('radarSvgTrain', t);

    // 대진표 업데이트
    for(let i=1; i<=4; i++){
        const node = document.getElementById(`node-${i}`);
        if(!node) continue;
        node.className = 'bracket-node';
        if(i < ST.round) node.classList.add('complete');
        else if(i === ST.round) node.classList.add('active');
        if(ST.isLeagueCleared && i === 4) node.classList.add('complete');
    }

    // 경기 버튼 상태
    const mBtn = document.getElementById('matchBtn');
    const fMsg = document.getElementById('failMessage');
    const wMsg = document.getElementById('waitMessage');
    const mCard = document.getElementById('matchCard');
    
    if (ST.isLeagueCleared) {
        mCard.style.display = 'none';
        wMsg.style.display = 'block';
    } else {
        mCard.style.display = 'block';
        wMsg.style.display = 'none';
        mBtn.disabled = ST.isFailed; 
        fMsg.style.display = ST.isFailed ? 'block' : 'none';
    }

    // 승률 계산 (내부용)
    const kr = [0, 1, 1.5, 2][ST.round];
    ST.curProb = (S <= league.M) ? 5 : (S >= league.N) ? 100 : Math.pow((S-league.M)/(league.N-league.M), kr)*100;
}

function drawRadar(id, totals) {
    const svg = document.getElementById(id);
    const labels = ['공격','수비','협력','기술','체력','속도'];
    const pts = labels.map((k, i) => {
        const a = (Math.PI * 2 * i / 6) - (Math.PI / 2);
        const val = Math.min(400, totals[k]);
        const x = 100 + (70 * val / 400) * Math.cos(a);
        const y = 100 + (70 * val / 400) * Math.sin(a);
        return `${x},${y}`;
    }).join(' ');
    svg.innerHTML = `
        <circle cx="100" cy="100" r="70" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
        <circle cx="100" cy="100" r="35" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
        <polygon points="${pts}" fill="rgba(212,173,106,0.3)" stroke="var(--accent)" stroke-width="2" style="transition:0.3s"/>
        ${labels.map((k, i) => {
            const a = (Math.PI * 2 * i / 6) - (Math.PI / 2);
            return `<text x="${100 + 88 * Math.cos(a)}" y="${100 + 88 * Math.sin(a)}" fill="#777" font-size="10" font-weight="700" text-anchor="middle" dominant-baseline="middle">${k}</text>`;
        }).join('')}
    `;
}

function playMatch() {
    if (ST.isFailed || ST.isLeagueCleared) return;
    const btn = document.getElementById('matchBtn');
    btn.disabled = true;
    
    setTimeout(() => {
        if (Math.random()*100 <= ST.curProb) {
            if (ST.round < 3) { 
                ST.round++; 
                ST.enemy = LEAGUES[ST.leagueIdx].enemies[ST.round-1]; 
                openOverlay("WIN", "다음 라운드 진출!", true);
            } else { 
                ST.isLeagueCleared = true;
                openOverlay("CHAMPION", "리그 우승을 차지했습니다!", true);
            }
        } else { 
            ST.isFailed = true; 
            openOverlay("LOSE", "패배했습니다. 전력을 보강하세요.", false);
        }
        render();
    }, 1000);
}

function openOverlay(title, sub, isWin) {
    const ov = document.getElementById('matchOverlay');
    const t = document.getElementById('resultTitle');
    const s = document.getElementById('resultSub');
    t.innerText = title;
    s.innerText = sub;
    t.className = isWin ? 'result-title win-text' : 'result-title lose-text';
    ov.classList.add('show');
}

function closeOverlay() {
    document.getElementById('matchOverlay').classList.remove('show');
}

function nextDay() {
    ST.isFailed = false; // 패배 상태 초기화 (버튼 활성화의 핵심)

    if (ST.isLeagueCleared) {
        if (ST.leagueIdx < 3) {
            ST.leagueIdx++;
            ST.round = 1;
            ST.isLeagueCleared = false;
            ST.enemy = LEAGUES[ST.leagueIdx].enemies[0];
            showToast(`새로운 리그 진출!`);
        } else {
            showToast("전든 대회를 정복했습니다!");
        }
    } else {
        ST.round = 1;
        ST.enemy = LEAGUES[ST.leagueIdx].enemies[0];
        showToast("다음 날이 되었습니다. 100P 지급!");
    }

    ST.day++; 
    ST.tp = Math.min(100, ST.tp + 100);
    render();
}

function doTrain(tid) {
    const t = TRAINS.find(x => x.id === tid);
    if (ST.tp < t.cost) return showToast("훈련 포인트가 부족합니다!");
    ST.tp -= t.cost;
    ST.players.forEach(p => { t.stats.forEach(s => { p.stats[s] = Math.min(400, p.stats[s] + 6); }); });
    render();
}

function switchTab(id, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById(`panel-${id}`).classList.add('active');
    render();
}

function showToast(m) {
    const t = document.getElementById('toast');
    t.innerText = m; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

window.onload = init;
</script>
</body>
</html>
