<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아크라시아 풋볼 챔피언</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #05070a;
            --card-bg: rgba(15, 20, 30, 0.95);
            --accent: #d4ad6a;
            --accent-bright: #f5c842;
            --text-main: #e8eaf0;
            --text-dim: #9ca3af;
            --error: #ff4d4d;
            --win: #2ecc71;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-dark); color: var(--text-main); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; overflow-x: hidden; }
        #app { max-width: 500px; margin: 0 auto; position: relative; padding-bottom: 40px; }

        .top-util { display: flex; justify-content: space-between; padding: 15px 20px; align-items: center; gap: 10px; }
        .status-badges { display: flex; gap: 8px; }
        .day-badge { background: rgba(212, 173, 106, 0.1); padding: 5px 12px; border-radius: 6px; border: 1px solid var(--accent); color: var(--accent); font-weight: 800; font-size: 13px; }
        .next-day-btn { background: var(--accent); color: #000; padding: 6px 14px; border-radius: 6px; border: none; font-weight: 800; cursor: pointer; font-size: 13px; }

        .header { text-align: center; padding: 20px 20px 10px; }
        .event-badge { display: inline-block; font-size: 11px; font-weight: 800; letter-spacing: 1px; padding: 4px 14px; border-radius: 4px; margin-bottom: 12px; background: var(--accent); color: #000; }
        h1 { font-size: 22px; font-weight: 900; color: #fff; }

        .tabs { display: grid; grid-template-columns: repeat(3, 1fr); margin: 15px 16px; background: rgba(255,255,255,0.05); border-radius: 12px; padding: 4px; }
        .tab-btn { background: transparent; border: none; padding: 12px; color: var(--text-dim); font-weight: 700; font-size: 13px; cursor: pointer; }
        .tab-btn.active { background: var(--accent); color: #000; border-radius: 8px; }

        .panel { display: none; padding: 0 16px; animation: fadeIn 0.3s ease-out; }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card-bg); border: 1px solid rgba(212, 173, 106, 0.2); border-radius: 20px; padding: 20px; margin-bottom: 16px; position: relative; }
        .card-title-sub { font-size: 12px; font-weight: 800; color: var(--text-dim); margin-bottom: 15px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; }

        .radar-box { display: flex; justify-content: center; margin: 10px 0; }
        .player-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .player-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 12px; }
        .p-name { font-size: 14px; font-weight: 900; margin-bottom: 8px; border-bottom: 1px solid rgba(212, 173, 106, 0.2); padding-bottom: 4px; }
        .p-stat-grid { display: flex; flex-direction: column; gap: 6px; font-size: 12px; }
        .p-stat-item { display: flex; justify-content: space-between; color: var(--accent-bright); }
        .p-stat-item.max { color: var(--error); font-weight: 800; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(10px); cursor: pointer; }
        .overlay.show { display: flex; }
        .res-title { font-size: 28px; font-weight: 900; margin-bottom: 15px; text-align: center; }
        .res-sub { font-size: 15px; font-weight: 500; color: var(--text-main); text-align: left; width: 85%; max-width: 400px; background: rgba(255,255,255,0.05); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        
        .list-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 16px; border-radius: 14px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; cursor: pointer; transition: 0.2s; }
        .list-item:hover { background: rgba(255,255,255,0.08); }
        .btn-confirm { width:100%; padding:16px; border-radius:14px; font-weight:800; background:var(--accent); color:#000; border:none; margin-top:10px; cursor:pointer; }
    </style>
</head>
<body>
    <div id="resOverlay" class="overlay" onclick="this.classList.remove('show')">
        <div id="resTitle" class="res-title"></div>
        <div id="resSub" class="res-sub"></div>
        <div style="margin-top:20px; color:var(--text-dim); font-size:12px; font-weight:700;">TAP TO CLOSE</div>
    </div>

    <div id="app">
        <div class="top-util">
            <div class="status-badges">
                <div class="day-badge" id="dayLabel">1일차</div>
                <div class="day-badge" style="border-color:var(--accent-bright); color:var(--accent-bright);">SEASON 2026</div>
            </div>
            <button class="next-day-btn" onclick="nextDay()">다음 날로 ➔</button>
        </div>

        <div class="header">
            <div class="event-badge">ARKRASIA FOOTBALL</div>
            <h1>아크라시아 풋볼 챔피언</h1>
        </div>

        <div id="mainTabs" class="tabs" style="display:none;">
            <button class="tab-btn active" onclick="switchTab('profile', this)">팀 관리</button>
            <button class="tab-btn" onclick="switchTab('training', this)">훈련</button>
            <button class="tab-btn" onclick="switchTab('match', this)">대회</button>
        </div>

        <div class="panel active" id="panel-profile">
            <div id="selectionArea">
                <div class="card-title-sub">원정대 팀 선택</div>
                <div id="teamGrid"></div>
                <button class="btn-confirm" id="confirmBtn" onclick="confirmTeam()" style="display:none;">팀 계약 체결</button>
            </div>
            <div id="teamInfoArea" style="display:none;">
                <div class="card" style="text-align:center;">
                    <div class="card-title-sub">📊 팀 랭크 육각형 (SS 한계: 2400)</div>
                    <div class="radar-box"><svg id="radarSvgProfile" width="200" height="200" viewBox="0 0 200 200"></svg></div>
                    <div id="totalStatsTextProfile" style="font-size:18px; margin-top:15px; color:var(--accent-bright); font-weight:900;"></div>
                </div>
                <div class="card">
                    <div class="card-title-sub">👥 선수별 성장도 (개인 MAX: 200)</div>
                    <div id="playerListUI" class="player-list"></div>
                </div>
            </div>
        </div>

        <div class="panel" id="panel-training">
            <div class="card" style="text-align:center;">
                <div class="card-title-sub">성장 그래프 (축 한도: 400)</div>
                <div class="radar-box"><svg id="radarSvgTrain" width="200" height="200" viewBox="0 0 200 200"></svg></div>
                <div style="margin-top:10px; font-size:13px; color:var(--accent);">보유 TP: <span id="tpLabel">100</span></div>
            </div>
            <div id="trainMenu"></div>
        </div>

        <div class="panel" id="panel-match">
             <div class="card" style="text-align:center;">
                <span id="leagueName" style="color:var(--accent-bright); font-weight:900; font-size:20px; display:block; margin-bottom:5px;">-</span>
                <div id="roundLabel" style="font-size:14px; color:var(--text-dim);">-</div>
            </div>
            <div id="matchCard" class="card" style="text-align:center; padding:30px;">
                <div id="myTeamLabel" style="font-weight:900; font-size:18px;">-</div>
                <div style="color:var(--accent); font-weight:900; margin:15px 0; font-size:20px;">VS</div>
                <div id="enemyTeamLabel" style="font-weight:900; color:var(--error); font-size:18px;">-</div>
                <button id="matchBtn" class="btn-confirm" onclick="playMatch()" style="margin-top:20px;">경기 시작</button>
            </div>
        </div>
    </div>

<script>
// --- [데이터 정의] ---
const PLAYER_MAX = 200;  // 개인 한계치
const RANK_MAX = 400;    // 육각형 한 축 한계치 (SS)
const GREAT_CHANCE = 0.05; // 대성공 5%

const TRAINS = [
    { id:'t1', name:"체력 훈련", cost:20, stats:['체력','속도'] },
    { id:'t2', name:"전술 훈련", cost:20, stats:['수비','협력'] },
    { id:'t3', name:"슈팅 훈련", cost:20, stats:['공격','기술'] },
    { id:'t4', name:"단체 명상", cost:30, stats:['수비','체력','속도'] },
    { id:'t5', name:"비디오 분석", cost:30, stats:['공격','협력','기술'] },
    { id:'t6', name:"전문 코치 초청 강의", cost:60, stats:['공격','수비','협력','기술','체력','속도'] }
];

const LEAGUES = [
    { name: "1차 예선", M: 480, N: 800, enemies: ["레온하트 네리아", "슈테른 네리아", "칸다리아 네리아"] },
    { name: "아크라시아 컵", M: 800, N: 1600, enemies: ["니나브", "카단", "실리안"] }
];

const TEAM_PLAYERS = {
    "베른 유나이티드": ["에아달린", "라하르트", "아델", "제레온"],
    "아르데타인 스틸러스": ["바스티안", "사샤", "카인", "마리 파우렌츠"],
    "루테란 FC": ["미한", "하셀링크", "하울로크", "칼스"],
    "엘가시아 CF": ["라우리엘", "아자키엘", "티엔", "프리우나"]
};

let ST = { 
    day: 1, tp: 100, leagueIdx: 0, round: 1, 
    players: [], selectedTeamName: null, enemy: '',
    isFailed: false, isLeagueCleared: false
};

// --- [초기화 및 렌더링] ---
function init() {
    const grid = document.getElementById('teamGrid');
    Object.keys(TEAM_PLAYERS).forEach(name => {
        const div = document.createElement('div');
        div.className = 'list-item';
        div.innerHTML = `<b>${name}</b>`;
        div.onclick = () => {
            ST.selectedTeamName = name;
            document.querySelectorAll('#teamGrid .list-item').forEach(i => i.style.borderColor = 'rgba(255,255,255,0.1)');
            div.style.borderColor = 'var(--accent)';
            document.getElementById('confirmBtn').style.display = 'block';
        };
        grid.appendChild(div);
    });
    
    const tMenu = document.getElementById('trainMenu');
    tMenu.innerHTML = TRAINS.map(t => `<div class="list-item" onclick="doTrain('${t.id}')"><div><div style="font-weight:800;">${t.name}</div><div style="font-size:11px; color:var(--text-dim);">${t.stats.join(', ')}</div></div><div style="color:var(--accent-bright); font-weight:900;">${t.cost}P</div></div>`).join('');
}

function confirmTeam() {
    const names = TEAM_PLAYERS[ST.selectedTeamName];
    // 포지션별 주력 스탯 배분 (예시)
    const targets = [['공격','속도','기술'],['공격','협력','기술'],['수비','협력','체력'],['수비','체력','속도']];
    
    ST.players = names.map((n, i) => ({ 
        name: n, 
        target: targets[i], 
        stats: {'공격':40,'수비':40,'협력':40,'기술':40,'체력':40,'속도':40} 
    }));
    
    ST.enemy = LEAGUES[0].enemies[0];
    document.getElementById('selectionArea').style.display = 'none';
    document.getElementById('mainTabs').style.display = 'grid';
    document.getElementById('teamInfoArea').style.display = 'block';
    render();
}

function getTeamTotals() {
    let totals = { '공격':0,'수비':0,'협력':0,'기술':0,'체력':0,'속도':0 };
    let mainSum = 0;
    ST.players.forEach(p => {
        Object.keys(p.stats).forEach(s => totals[s] += p.stats[s]);
        p.target.forEach(s => mainSum += p.stats[s]);
    });
    return { totals, mainSum };
}

function render() {
    if (!ST.players.length) return;
    const { totals, mainSum } = getTeamTotals();
    
    document.getElementById('dayLabel').innerText = `${ST.day}일차`;
    document.getElementById('tpLabel').innerText = ST.tp;
    document.getElementById('totalStatsTextProfile').innerText = `TOTAL POWER: ${mainSum}`;
    
    // 선수 리스트 UI
    const pListUI = document.getElementById('playerListUI');
    pListUI.innerHTML = ST.players.map(p => {
        const statsHtml = Object.keys(p.stats)
            .filter(s => p.target.includes(s))
            .map(s => {
                const isMax = p.stats[s] >= PLAYER_MAX;
                return `<div class="p-stat-item ${isMax?'max':''}"><span>${s}</span> <b>${p.stats[s]}</b></div>`;
            }).join('');
        return `<div class="player-item"><div class="p-name" style="color:var(--accent);">${p.name}</div><div class="p-stat-grid">${statsHtml}</div></div>`;
    }).join('');

    // 대회 UI
    const league = LEAGUES[ST.leagueIdx];
    document.getElementById('leagueName').innerText = league.name;
    document.getElementById('roundLabel').innerText = `${ST.round}Round`;
    document.getElementById('myTeamLabel').innerText = ST.selectedTeamName;
    document.getElementById('enemyTeamLabel').innerText = ST.enemy;

    drawRadar('radarSvgProfile', totals);
    drawRadar('radarSvgTrain', totals);
}

// --- [핵심 로직: 그래프 & 훈련] ---
function drawRadar(id, totals) {
    const svg = document.getElementById(id);
    const labels = ['공격','수비','협력','기술','체력','속도'];
    const pts = labels.map((k, i) => {
        const a = (Math.PI * 2 * i / 6) - (Math.PI / 2);
        // 육각형 축 최대치를 RANK_MAX(400)으로 설정
        const val = Math.min(RANK_MAX, totals[k] || 0);
        const r = 75; // 반지름
        return `${100 + (r * val / RANK_MAX) * Math.cos(a)},${100 + (r * val / RANK_MAX) * Math.sin(a)}`;
    }).join(' ');
    
    svg.innerHTML = `
        <circle cx="100" cy="100" r="75" fill="none" stroke="rgba(255,255,255,0.1)"/>
        <circle cx="100" cy="100" r="37.5" fill="none" stroke="rgba(255,255,255,0.05)"/>
        <polygon points="${pts}" fill="rgba(212,173,106,0.3)" stroke="var(--accent)" stroke-width="2"/>
        ${labels.map((k, i) => { 
            const a = (Math.PI * 2 * i / 6) - (Math.PI / 2);
            return `<text x="${100 + 88 * Math.cos(a)}" y="${100 + 88 * Math.sin(a)}" fill="#777" font
