<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아크라시아 풋볼 챔피언</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #05070a;
            --card-bg: rgba(15, 20, 30, 0.95);
            --accent: #d4ad6a;
            --accent-bright: #f5c842;
            --text-main: #e8eaf0;
            --text-dim: #9ca3af;
            --error: #ff4d4d;
            --win: #2ecc71;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-dark); color: var(--text-main); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; overflow-x: hidden; }
        #app { max-width: 500px; margin: 0 auto; position: relative; padding-bottom: 40px; }

        .top-util { display: flex; justify-content: space-between; padding: 15px 20px; align-items: center; gap: 10px; }
        .status-badges { display: flex; gap: 8px; }
        .day-badge { background: rgba(212, 173, 106, 0.1); padding: 5px 12px; border-radius: 6px; border: 1px solid var(--accent); color: var(--accent); font-weight: 800; font-size: 13px; }
        .week-badge { background: rgba(245, 200, 66, 0.15); padding: 5px 12px; border-radius: 6px; border: 1px solid var(--accent-bright); color: var(--accent-bright); font-weight: 800; font-size: 13px; }
        .next-day-btn { background: var(--accent); color: #000; padding: 6px 14px; border-radius: 6px; border: none; font-weight: 800; cursor: pointer; font-size: 13px; }

        .header { text-align: center; padding: 20px 20px 10px; }
        .event-badge { display: inline-block; font-size: 11px; font-weight: 800; letter-spacing: 1px; padding: 4px 14px; border-radius: 4px; margin-bottom: 12px; background: var(--accent); color: #000; }
        h1 { font-size: 22px; font-weight: 900; color: #fff; text-shadow: 0 0 15px rgba(212, 173, 106, 0.3); }

        .tabs { display: grid; grid-template-columns: repeat(3, 1fr); margin: 15px 16px; background: rgba(255,255,255,0.05); border-radius: 12px; padding: 4px; }
        .tab-btn { background: transparent; border: none; padding: 12px; color: var(--text-dim); font-weight: 700; font-size: 13px; cursor: pointer; }
        .tab-btn.active { background: var(--accent); color: #000; border-radius: 8px; }

        .panel { display: none; padding: 0 16px; animation: fadeIn 0.3s ease-out; }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card-bg); border: 1px solid rgba(212, 173, 106, 0.2); border-radius: 20px; padding: 20px; margin-bottom: 16px; position: relative; }
        .league-title-main { font-size: 20px; font-weight: 900; color: var(--accent-bright); text-align: center; margin-bottom: 15px; display: block; }
        .card-title-sub { font-size: 12px; font-weight: 800; color: var(--text-dim); margin-bottom: 15px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; }

        .player-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .player-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 12px; }
        .p-pos { font-size: 10px; color: var(--accent); font-weight: 800; }
        .p-name { font-size: 14px; font-weight: 900; margin-bottom: 6px; }
        .p-stat-grid { display: flex; flex-direction: column; gap: 4px; font-size: 11px; }
        .p-stat-item { display: flex; justify-content: space-between; color: var(--accent-bright); }
        .p-stat-item.max { color: var(--error); }

        .btn { width: 100%; padding: 16px; border-radius: 14px; font-weight: 800; border: none; cursor: pointer; font-size: 15px; }
        .btn-primary { background: linear-gradient(135deg, var(--accent), #b89156); color: #000; }
        .btn:disabled { background: #333; color: #666; cursor: not-allowed; }

        .radar-box { position: relative; width: 200px; height: 200px; margin: 0 auto; }
        .bracket-wrapper { position: relative; display: flex; justify-content: space-between; align-items: center; padding: 25px 0 10px; }
        .bracket-step { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; position: relative; z-index: 2;}
        .bracket-node { width: 40px; height: 40px; border-radius: 50%; background: #1a1f26; border: 2px solid #333; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 13px; color: #555; }
        .bracket-node.active { background: var(--accent); border-color: var(--accent-bright); color: #000; }
        .bracket-node.complete { background: var(--win); border-color: var(--win); color: #fff; }
        .bracket-connector { position: absolute; top: 45px; left: 12.5%; width: 75%; height: 2px; background: #222; z-index: 1; }
        .connector-progress { position: absolute; top: 0; left: 0; height: 100%; width: 0%; background: var(--win); transition: 0.6s ease; }

        #matchOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(8px); }
        #matchOverlay.show { display: flex; }
        .result-title { font-size: 64px; font-weight: 900; }
        .win-text { color: var(--win); }
        .lose-text { color: var(--error); }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); opacity: 0; transition: 0.3s; background: var(--accent); color: #000; padding: 12px 24px; border-radius: 30px; z-index: 1000; font-weight: 700; pointer-events: none; text-align: center; }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }

        .list-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 16px; border-radius: 14px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="matchOverlay" onclick="closeOverlay()">
        <div id="resultTitle" class="result-title">승리</div>
        <div id="resultSub" style="font-size: 20px; font-weight: 700;">다음 라운드 진출!</div>
    </div>

    <div id="app">
        <div class="top-util">
            <div class="status-badges">
                <div class="day-badge" id="currentDayLabel">1일차</div>
                <div class="week-badge" id="currentWeekLabel">1주차</div>
            </div>
            <button class="next-day-btn" onclick="nextDay()">다음 날로 ➔</button>
        </div>

        <div class="header">
            <div class="event-badge">아크라시아 풋볼 챔피언</div>
            <h1>아크라시아 풋볼 챔피언</h1>
        </div>

        <div class="tabs" id="mainTabs" style="display:none;">
            <button class="tab-btn active" onclick="switchTab('profile', this)">팀 관리</button>
            <button class="tab-btn" onclick="switchTab('training', this)">훈련</button>
            <button class="tab-btn" onclick="switchTab('match', this)">대회</button>
        </div>

        <div class="panel active" id="panel-profile">
            <div id="selectionArea">
                <div class="card-title-sub">원정대 팀 선택</div>
                <div id="teamGrid"></div>
                <button class="btn btn-primary" id="confirmBtn" onclick="confirmTeam()" style="display:none; margin-top:10px;">팀 계약 체결</button>
            </div>
            <div id="teamInfoArea" style="display:none;">
                <div class="card" style="text-align:center;">
                    <div class="card-title-sub">📊 팀 종합 스탯 현황</div>
                    <div class="radar-box"><svg id="radarSvgProfile" width="200" height="200" viewBox="0 0 200 200"></svg></div>
                    <div id="totalStatsTextProfile" style="font-size:18px; margin-top:15px; color:var(--accent-bright); font-weight:900;"></div>
                </div>
                <div class="card">
                    <div class="card-title-sub">👥 소속 선수 명단 (특화 스탯)</div>
                    <div id="playerListUI" class="player-list"></div>
                </div>
            </div>
        </div>

        <div class="panel" id="panel-training">
            <div class="card" style="text-align:center;">
                <div class="card-title-sub">성장 그래프</div>
                <div class="radar-box"><svg id="radarSvgTrain" width="200" height="200" viewBox="0 0 200 200"></svg></div>
                <div id="totalStatsTextTrain" style="font-size:14px; margin-top:10px; color:var(--accent-bright); font-weight:800;"></div>
                <div style="font-size:13px; color:var(--text-dim); margin-top:12px;">누적 훈련 포인트: <span id="tpLabel" style="color:var(--accent); font-weight:900; font-size:18px;">0</span></div>
            </div>
            <div id="trainMenu"></div>
        </div>

        <div class="panel" id="panel-match">
            <div class="card">
                <span id="currentLeagueName" class="league-title-main">1차 예선</span>
                <div class="card-title-sub">토너먼트 진행 현황</div>
                <div class="bracket-wrapper">
                    <div class="bracket-connector"><div id="connectorProgress" class="connector-progress"></div></div>
                    <div class="bracket-step"><div class="bracket-node" id="node-1">8</div><div class="bracket-label">8강</div></div>
                    <div class="bracket-step"><div class="bracket-node" id="node-2">4</div><div class="bracket-label">4강</div></div>
                    <div class="bracket-step"><div class="bracket-node" id="node-3">2</div><div class="bracket-label">결승</div></div>
                    <div class="bracket-step"><div class="bracket-node" id="node-4">🏆</div><div class="bracket-label">우승</div></div>
                </div>
            </div>
            <div id="matchCard" class="card">
                <div style="text-align:center; padding:15px;">
                    <div id="myTeamLabel" style="font-weight:900; font-size:18px;">우리팀</div>
                    <div style="color:var(--accent); font-weight:900; margin:8px 0; font-size:14px;">VS</div>
                    <div id="enemyTeamLabel" style="font-weight:900; font-size:20px; color:var(--error);">상대팀</div>
                    <div id="winProbLabel" style="font-size:12px; color:var(--text-dim); margin-top:10px;">예상 승률: 0%</div>
                </div>
                <button class="btn btn-primary" id="matchBtn" onclick="playMatch()">경기 시작</button>
                <div id="failMessage" style="display:none; margin-top:12px; color:var(--error); font-size:13px; text-align:center; font-weight:700;">오늘은 더 이상 경기를 치를 수 없습니다.<br>훈련 후 다음 날 다시 도전하세요!</div>
            </div>
            <div id="waitMessage" class="card" style="display:none; text-align:center; padding:40px 10px;">
                <div style="font-weight:900; color:var(--accent-bright); font-size:22px;">리그 우승 달성!</div>
                <div style="font-size:14px; color:var(--text-dim); margin-top:10px;">다음 날로 넘어가면 다음 리그가 시작됩니다.</div>
            </div>
        </div>
    </div>
    <div id="toast"></div>

<script>
const MAX_STAT = 400;
const TEAMS_DATA = {
    "베른 유나이티드": { captain: "에아달린", players: ["라하르트", "아델", "제레온"] },
    "아르데타인 스틸러스": { captain: "바스티안", players: ["사샤", "카인", "마리 파우렌츠"] },
    "루테란 FC": { captain: "미한", players: ["하셀링크", "하울로크", "칼스"] },
    "엘가시아 CF": { captain: "라우리엘", players: ["아자키엘", "티엔", "프리우나"] },
    "SSC 볼다이크": { captain: "세헤라데", players: ["마레가", "아이작", "마리우"] }
};

const LEAGUES = [
    { name: "1차 예선", M: 480, N: 960, enemies: ["레온하트 네리아","슈테른 네리아","칸다리아 네리아"] },
    { name: "2차 예선", M: 960, N: 1440, enemies: ["판다 푸푸","나루니","코니"] },
    { name: "3차 예선", M: 1440, N: 1920, enemies: ["발탄","비아키스","카멘"] },
    { name: "아크라시아 컵", M: 2200, N: 2400, enemies: ["니나브","카단","실리안"] }
];

const TRAINS = [
    { id:'t1', name:"기초 체력", cost:20, stats:['체력','속도'] },
    { id:'t2', name:"전술 훈련", cost:20, stats:['수비','협력'] },
    { id:'t3', name:"슈팅 훈련", cost:20, stats:['공격','기술'] },
    { id:'t4', name:"비디오 분석", cost:30, stats:['공격','협력','기술'] },
    { id:'t5', name:"단체 명상", cost:30, stats:['수비','체력','속도'] },
    { id:'t6', name:"전문 강사 초청", cost:60, stats:['공격','수비','협력','기술','체력','속도'] }
];

let ST = { day: 1, tp: 100, leagueIdx: 0, round: 1, selectedTeamName: null, players: [], enemy: null, isLeagueCleared: false, isFailed: false, curProb: 0 };

function init() {
    const grid = document.getElementById('teamGrid');
    grid.innerHTML = Object.keys(TEAMS_DATA).map(name => `<div class="list-item" id="team-${name}" onclick="ST.selectedTeamName='${name}'; renderSelection();"><b>${name}</b><span style="color:var(--accent); font-size:12px; font-weight:700;">${TEAMS_DATA[name].captain}</span></div>`).join('');
    const tMenu = document.getElementById('trainMenu');
    tMenu.innerHTML = TRAINS.map(t => `<div class="list-item" onclick="doTrain('${t.id}')"><div><div style="font-weight:800;">${t.name}</div><div style="font-size:11px; color:var(--text-dim);">${t.stats.join(', ')}</div></div><div style="color:var(--accent-bright); font-weight:900;">${t.cost}P</div></div>`).join('');
}

function renderSelection() {
    document.querySelectorAll('[id^="team-"]').forEach(el => el.style.borderColor = 'rgba(255,255,255,0.1)');
    const selected = document.getElementById(`team-${ST.selectedTeamName}`);
    if (selected) selected.style.borderColor = 'var(--accent)';
    document.getElementById('confirmBtn').style.display = 'block';
}

function confirmTeam() {
    const data = TEAMS_DATA[ST.selectedTeamName];
    const posSet = [{p:'공격수', s:['공격','속도','기술']},{p:'미드필더', s:['공격','협력','기술']},{p:'수비수', s:['수비','협력','체력']},{p:'골키퍼', s:['수비','체력','속도']}];
    ST.players = [data.captain, ...data.players].map((n, i) => ({ 
        name: n, pos: posSet[i].p, target: posSet[i].s, 
        stats: {'공격':40,'수비':40,'협력':40,'기술':40,'체력':40,'속도':40} 
    }));
    ST.enemy = LEAGUES[ST.leagueIdx].enemies[0];
    document.getElementById('selectionArea').style.display = 'none';
    document.getElementById('mainTabs').style.display = 'grid';
    document.getElementById('teamInfoArea').style.display = 'block';
    render();
}

function calculateTotals() {
    let teamTotals = { '공격':0,'수비':0,'협력':0,'기술':0,'체력':0,'속도':0 };
    ST.players.forEach(p => { p.target.forEach(sName => { teamTotals[sName] += p.stats[sName]; }); });
    const S = Object.values(teamTotals).reduce((a,b)=>a+b, 0);
    return { t: teamTotals, S: S };
}

function render() {
    if (!ST.players.length) return;
    const { t, S } = calculateTotals();
    const league = LEAGUES[ST.leagueIdx];
    const currentWeek = Math.min(10, Math.floor((ST.day - 1) / 7) + 1);
    
    document.getElementById('currentDayLabel').innerText = `${ST.day}일차`;
    document.getElementById('currentWeekLabel').innerText = `${currentWeek}주차`;
    document.getElementById('tpLabel').innerText = ST.tp;
    document.getElementById('totalStatsTextProfile').innerText = `팀 종합 스탯 ${S}`;
    document.getElementById('totalStatsTextTrain').innerText = `현재 종합 스탯 ${S}`;
    document.getElementById('myTeamLabel').innerText = ST.selectedTeamName;
    document.getElementById('enemyTeamLabel').innerText = ST.enemy;
    document.getElementById('currentLeagueName').innerText = league.name;
    
    const pListUI = document.getElementById('playerListUI');
    pListUI.innerHTML = ST.players.map(p => {
        const statsHtml = p.target.map(sKey => {
            const isMax = p.stats[sKey] >= MAX_STAT;
            return `<div class="p-stat-item ${isMax ? 'max' : ''}"><span>${sKey}</span> <b>${p.stats[sKey]}${isMax ? '(MAX)' : ''}</b></div>`;
        }).join('');
        return `<div class="player-item"><div class="p-pos">${p.pos}</div><div class="p-name">${p.name}</div><div class="p-stat-grid">${statsHtml}</div></div>`;
    }).join('');
    
    drawRadar('radarSvgProfile', t);
    drawRadar('radarSvgTrain', t);
    
    // 대진표 및 버튼 상태
    const progress = document.getElementById('connectorProgress');
    let progressVal = 0;
    for(let i=1; i<=4; i++){
        const node = document.getElementById(`node-${i}`);
        if(!node) continue;
        node.className = 'bracket-node';
        if(i < ST.round) { node.classList.add('complete'); progressVal = (i / 3) * 100; }
        else if(i === ST.round && !ST.isLeagueCleared) { node.classList.add('active'); }
        if(ST.isLeagueCleared && i === 4) { node.classList.add('complete'); progressVal = 100; }
    }
    progress.style.width = `${progressVal}%`;
    
    const mCard = document.getElementById('matchCard');
    const wMsg = document.getElementById('waitMessage');
    const mBtn = document.getElementById('matchBtn');
    
    if (ST.isLeagueCleared) {
        mCard.style.display = 'none'; wMsg.style.display = 'block';
    } else {
        mCard.style.display = 'block'; wMsg.style.display = 'none';
        mBtn.disabled = ST.isFailed;
        document.getElementById('failMessage').style.display = ST.isFailed ? 'block' : 'none';
    }
    
    const kr = [0, 1, 1.5, 2][ST.round];
    ST.curProb = (S < league.M) ? 0 : (S >= league.N) ? 100 : Math.pow((S - league.M) / (league.N - league.M), kr) * 100;
    document.getElementById('winProbLabel').innerText = `예상 승률: ${Math.floor(ST.curProb)}%`;
}

function doTrain(tid) {
    const t = TRAINS.find(x => x.id === tid);
    if (ST.tp < t.cost) return showToast("훈련 포인트가 부족합니다!");

    let allMax = true;
    ST.players.forEach(p => {
        t.stats.forEach(s => { if (p.stats[s] < MAX_STAT) allMax = false; });
    });

    if (allMax) {
        alert(`이미 '${t.name}'으로 올릴 수 있는 모든 스탯이 최대치(MAX)입니다.`);
        return;
    }

    const isGreatSuccess = Math.random() < 0.05;
    const increment = isGreatSuccess ? 10 : 5;

    ST.players.forEach(p => {
        t.stats.forEach(s => {
            if (p.stats[s] < MAX_STAT) p.stats[s] = Math.min(MAX_STAT, p.stats[s] + increment);
        });
    });

    ST.tp -= t.cost;
    showToast(isGreatSuccess ? "✨ 대성공! 스탯 +10 ✨" : "훈련 완료! 스탯 +5");
    render();
}

function playMatch() {
    if (ST.isFailed || ST.isLeagueCleared) return;
    document.getElementById('matchBtn').disabled = true;
    
    setTimeout(() => {
        if (Math.random() * 100 <= ST.curProb) {
            if (ST.round < 3) {
                ST.round++;
                ST.enemy = LEAGUES[ST.leagueIdx].enemies[ST.round-1];
                openOverlay("승리", "다음 라운드 진출!", true);
            } else {
                ST.isLeagueCleared = true;
                openOverlay("우승", `${LEAGUES[ST.leagueIdx].name} 정상에 올랐습니다!`, true);
            }
        } else {
            ST.isFailed = true;
            openOverlay("패배", "아쉽게 패배했습니다. 전력을 보강하세요.", false);
        }
        render();
    }, 800);
}

function openOverlay(title, sub, isWin) {
    const ov = document.getElementById('matchOverlay');
    document.getElementById('resultTitle').innerText = title;
    document.getElementById('resultTitle').className = isWin ? 'result-title win-text' : 'result-title lose-text';
    document.getElementById('resultSub').innerText = sub;
    ov.classList.add('show');
}

function closeOverlay() { document.getElementById('matchOverlay').classList.remove('show'); }

// 다음 날로 넘기기 로직 (수정됨)
function nextDay() {
    if (ST.day >= 70) return showToast("이벤트가 종료되었습니다.");

    ST.day++;
    ST.tp += 100;
    
    // 1. 경기 실패 상태였다면 리셋 (패배 시 해당 리그 1라운드부터 다시)
    if (ST.isFailed) {
        ST.isFailed = false;
        ST.round = 1;
        ST.enemy = LEAGUES[ST.leagueIdx].enemies[0];
        showToast("새 아침이 밝았습니다. 다시 도전하세요!");
    } 
    // 2. 리그를 이미 클리어한 상태였다면 다음 리그로
    else if (ST.isLeagueCleared) {
        if (ST.leagueIdx < LEAGUES.length - 1) {
            ST.leagueIdx++;
            ST.round = 1;
            ST.isLeagueCleared = false;
            ST.enemy = LEAGUES[ST.leagueIdx].enemies[0];
            showToast(`${LEAGUES[ST.leagueIdx].name} 진출! 100P 획득!`);
        } else {
            showToast("모든 리그를 정복했습니다! 축하합니다!");
        }
    } 
    // 3. 리그 진행 중인 상태(승리 후 다음날 클릭 등)
    else {
        showToast("새 아침이 밝았습니다. 100P 획득!");
    }

    render();
}

function drawRadar(id, totals) {
    const svg = document.getElementById(id);
    const labels = ['공격','수비','협력','기술','체력','속도'];
    const pts = labels.map((k, i) => {
        const a = (Math.PI * 2 * i / 6) - (Math.PI / 2);
        const val = Math.min(400, totals[k]);
        return `${100 + (75 * val / 400) * Math.cos(a)},${100 + (75 * val / 400) * Math.sin(a)}`;
    }).join(' ');
    svg.innerHTML = `<circle cx="100" cy="100" r="75" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/><polygon points="${pts}" fill="rgba(212,173,106,0.3)" stroke="var(--accent)" stroke-width="2"/>${labels.map((k, i) => { const a = (Math.PI * 2 * i / 6) - (Math.PI / 2); return `<text x="${100 + 92 * Math.cos(a)}" y="${100 + 92 * Math.sin(a)}" fill="#888" font-size="11" text-anchor="middle" dominant-baseline="middle">${k}</text>`; }).join('')}`;
}

function switchTab(id, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById(`panel-${id}`).classList.add('active');
    render();
}

function showToast(m) {
    const t = document.getElementById('toast');
    t.innerHTML = m; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}

window.onload = init;
</script>
</body>
</html>
