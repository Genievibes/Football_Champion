<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아크라시아 풋볼 챔피언</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #05070a;
            --card-bg: rgba(15, 20, 30, 0.95);
            --accent: #d4ad6a;
            --accent-bright: #f5c842;
            --text-main: #e8eaf0;
            --text-dim: #9ca3af;
            --error: #ff4d4d;
            --win: #2ecc71;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-dark); color: var(--text-main); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; overflow-x: hidden; }
        #app { max-width: 500px; margin: 0 auto; position: relative; padding-bottom: 40px; }

        .top-util { display: flex; justify-content: space-between; padding: 15px 20px; align-items: center; gap: 10px; }
        .status-badges { display: flex; gap: 8px; }
        .day-badge { background: rgba(212, 173, 106, 0.1); padding: 5px 12px; border-radius: 6px; border: 1px solid var(--accent); color: var(--accent); font-weight: 800; font-size: 13px; }
        .next-day-btn { background: var(--accent); color: #000; padding: 6px 14px; border-radius: 6px; border: none; font-weight: 800; cursor: pointer; font-size: 13px; }

        .header { text-align: center; padding: 20px 20px 10px; }
        .event-badge { display: inline-block; font-size: 11px; font-weight: 800; letter-spacing: 1px; padding: 4px 14px; border-radius: 4px; margin-bottom: 12px; background: var(--accent); color: #000; }
        h1 { font-size: 22px; font-weight: 900; color: #fff; }

        .tabs { display: grid; grid-template-columns: repeat(3, 1fr); margin: 15px 16px; background: rgba(255,255,255,0.05); border-radius: 12px; padding: 4px; }
        .tab-btn { background: transparent; border: none; padding: 12px; color: var(--text-dim); font-weight: 700; font-size: 13px; cursor: pointer; }
        .tab-btn.active { background: var(--accent); color: #000; border-radius: 8px; }

        .panel { display: none; padding: 0 16px; animation: fadeIn 0.3s ease-out; }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card-bg); border: 1px solid rgba(212, 173, 106, 0.2); border-radius: 20px; padding: 20px; margin-bottom: 16px; position: relative; }
        .league-title-main { font-size: 20px; font-weight: 900; color: var(--accent-bright); text-align: center; margin-bottom: 15px; display: block; }
        .card-title-sub { font-size: 12px; font-weight: 800; color: var(--text-dim); margin-bottom: 15px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; }

        .train-status-bar { display: flex; justify-content: center; gap: 15px; margin-top: 12px; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 12px; }
        .status-item { text-align: center; }
        .status-label { font-size: 11px; color: var(--text-dim); display: block; margin-bottom: 2px; }
        .status-value { font-size: 16px; font-weight: 900; color: var(--accent); }

        .player-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .player-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 12px; }
        .p-pos { font-size: 10px; color: var(--accent); font-weight: 800; }
        .p-name { font-size: 14px; font-weight: 900; margin-bottom: 6px; }
        .p-stat-grid { display: flex; flex-direction: column; gap: 4px; font-size: 11px; }
        .p-stat-item { display: flex; justify-content: space-between; color: var(--accent-bright); }
        .p-stat-item.max { color: var(--error); font-weight: 800; }

        .btn { width: 100%; padding: 16px; border-radius: 14px; font-weight: 800; border: none; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .btn-primary { background: linear-gradient(135deg, var(--accent), #b89156); color: #000; }
        .btn:disabled { background: #222 !important; color: #555 !important; cursor: not-allowed; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(10px); cursor: pointer; }
        .overlay.show { display: flex; }
        .res-title { font-size: 48px; font-weight: 900; margin-bottom: 10px; text-align: center; }
        .res-sub { font-size: 18px; font-weight: 700; color: var(--text-dim); text-align: center; max-width: 80%; line-height: 1.5; }
        .win-text { color: var(--win); }
        .lose-text { color: var(--error); }
        .great-text { color: var(--accent-bright); text-shadow: 0 0 30px rgba(245, 200, 66, 0.8); animation: pulse 0.6s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        .bracket-wrapper { position: relative; display: flex; justify-content: space-between; align-items: center; padding: 25px 0 10px; }
        .bracket-node { width: 40px; height: 40px; border-radius: 50%; background: #1a1f26; border: 2px solid #333; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 13px; color: #555; }
        .bracket-node.active { background: var(--accent); border-color: var(--accent-bright); color: #000; box-shadow: 0 0 15px var(--accent); }
        .bracket-node.complete { background: var(--win); border-color: var(--win); color: #fff; }
        .bracket-connector { position: absolute; top: 45px; left: 12.5%; width: 75%; height: 2px; background: #222; z-index: 1; }
        .connector-progress { position: absolute; top: 0; left: 0; height: 100%; width: 0%; background: var(--win); transition: 0.6s ease; }

        .list-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 16px; border-radius: 14px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="resOverlay" class="overlay" onclick="this.classList.remove('show')">
        <div id="resTitle" class="res-title"></div>
        <div id="resSub" class="res-sub"></div>
    </div>

    <div id="app">
        <div class="top-util">
            <div class="status-badges">
                <div class="day-badge" id="dayLabel">1일차</div>
                <div class="day-badge" id="weekLabel" style="border-color:var(--accent-bright); color:var(--accent-bright);">1주차</div>
            </div>
            <button class="next-day-btn" onclick="nextDay()">다음 날로 ➔</button>
        </div>

        <div class="header">
            <div class="event-badge">SEASON 2026</div>
            <h1>아크라시아 풋볼 챔피언</h1>
        </div>

        <div id="mainTabs" class="tabs" style="display:none;">
            <button class="tab-btn active" onclick="switchTab('profile', this)">팀 관리</button>
            <button class="tab-btn" onclick="switchTab('training', this)">훈련</button>
            <button class="tab-btn" onclick="switchTab('match', this)">대회</button>
        </div>

        <div class="panel active" id="panel-profile">
            <div id="selectionArea">
                <div class="card-title-sub">원정대 팀 선택</div>
                <div id="teamGrid"></div>
                <button class="btn btn-primary" id="confirmBtn" onclick="confirmTeam()" style="display:none; margin-top:10px;">팀 계약 체결</button>
            </div>
            <div id="teamInfoArea" style="display:none;">
                <div class="card" style="text-align:center;">
                    <div class="card-title-sub">📊 팀 종합 스탯 (SS등급 400)</div>
                    <div class="radar-box"><svg id="radarSvgProfile" width="200" height="200" viewBox="0 0 200 200"></svg></div>
                    <div id="totalStatsTextProfile" style="font-size:18px; margin-top:15px; color:var(--accent-bright); font-weight:900;"></div>
                </div>
                <div class="card">
                    <div class="card-title-sub">👥 소속 선수 명단</div>
                    <div id="playerListUI" class="player-list"></div>
                </div>
            </div>
        </div>

        <div class="panel" id="panel-training">
            <div class="card" style="text-align:center;">
                <div class="card-title-sub">성장 그래프</div>
                <div class="radar-box"><svg id="radarSvgTrain" width="200" height="200" viewBox="0 0 200 200"></svg></div>
                <div class="train-status-bar">
                    <div class="status-item">
                        <span class="status-label">보유 포인트</span>
                        <span id="tpLabel" class="status-value">0</span><span style="font-size:12px; color:var(--accent);">P</span>
                    </div>
                    <div style="width:1px; background:rgba(255,255,255,0.1); margin:5px 0;"></div>
                    <div class="status-item">
                        <span class="status-label">팀 전체 스탯</span>
                        <span id="totalStatsTextTrain" class="status-value">0</span>
                    </div>
                </div>
            </div>
            <div id="trainMenu"></div>
        </div>

        <div class="panel" id="panel-match">
            <div class="card">
                <span id="leagueName" class="league-title-main">1차 예선</span>
                <div class="bracket-wrapper">
                    <div class="bracket-connector"><div id="connectorProgress" class="connector-progress"></div></div>
                    <div class="bracket-step"><div class="bracket-node" id="node-1">8</div><div style="font-size:10px; margin-top:4px;">8강</div></div>
                    <div class="bracket-step"><div class="bracket-node" id="node-2">4</div><div style="font-size:10px; margin-top:4px;">4강</div></div>
                    <div class="bracket-step"><div class="bracket-node" id="node-3">2</div><div style="font-size:10px; margin-top:4px;">결승</div></div>
                    <div class="bracket-step"><div class="bracket-node" id="node-4">🏆</div><div style="font-size:10px; margin-top:4px;">우승</div></div>
                </div>
            </div>
            <div id="matchCard" class="card">
                <div style="text-align:center; padding:15px;">
                    <div id="myTeamLabel" style="font-weight:900; font-size:18px;">우리팀</div>
                    <div style="color:var(--accent); font-weight:900; margin:12px 0; font-size:20px;">VS</div>
                    <div id="enemyTeamLabel" style="font-weight:900; font-size:22px; color:var(--error);">상대팀</div>
                </div>
                <button class="btn btn-primary" id="matchBtn" onclick="playMatch()">경기 시작</button>
                <div id="failMsg" style="display:none; margin-top:12px; color:var(--error); font-size:13px; text-align:center; font-weight:700;">패배했습니다. 내일 다시 도전하세요!</div>
            </div>
            <div id="clearMsg" class="card" style="display:none; text-align:center; padding:30px 10px;">
                <div style="font-weight:900; color:var(--win); font-size:22px;">LEAGUE CLEARED!</div>
                <div style="font-size:13px; color:var(--text-dim); margin-top:10px;">내일 새로운 리그가 시작됩니다.</div>
            </div>
        </div>
    </div>

<script>
const MAX_STAT = 200; // 개별 선수 MAX
const TEAM_MAX_STAT = 400; // 팀 종합 MAX (SS등급 기준)
const DAILY_TP = 40; // 일일 획득 포인트

// 기획서 기반 훈련 데이터 정의
const TRAINS = [
    { id:'t1', name:"셔틀런", cost:20, stats:['체력','속도'] },
    { id:'t2', name:"슈팅 연습", cost:20, stats:['공격','기술'] },
    { id:'t3', name:"전술 훈련", cost:20, stats:['수비','협력'] },
    { id:'t4', name:"미니 게임", cost:30, stats:['공격','협력','기술'] },
    { id:'t5', name:"담력 훈련", cost:30, stats:['수비','체력','속도'] },
    { id:'t6', name:"해외 전지훈련", cost:60, stats:['공격','수비','협력','기술','체력','속도'] }
];

const TEAMS_DATA = {
    "베른 유나이티드": { captain: "에아달린", players: ["라하르트", "아델", "제레온"] },
    "아르데타인 스틸러스": { captain: "바스티안", players: ["사샤", "카인", "마리 파우렌츠"] },
    "루테란 FC": { captain: "미한", players: ["하셀링크", "하울로크", "칼스"] },
    "엘가시아 CF": { captain: "라우리엘", players: ["아자키엘", "티엔", "프리우나"] },
    "SSC 볼다이크": { captain: "세헤라데", players: ["마레가", "아이작", "마리우"] }
};

const LEAGUES = [
    { name: "1차 예선", M: 480, N: 960, enemies: ["레온하트 네리아", "루테란 성 네리아", "슈테른 네리아", "위대한 성 네리아", "칸다리아 네리아", "칼리나리 네리아", "갈기파도 네리아"] },
    { name: "2차 예선", M: 960, N: 1440, enemies: ["판다 푸푸", "샐리", "다람쥐 욤", "나루니", "코니", "토토이끼", "파파"] },
    { name: "3차 예선", M: 1440, N: 1920, enemies: ["발탄", "비아키스", "쿠크세이튼", "에키드나", "아브렐슈드", "일리아칸", "카멘"] },
    { name: "아크라시아 컵", M: 2200, N: 2400, enemies: ["니나브", "카단", "웨이", "바훈투르", "아제나&이난나", "샨디", "실리안"] }
];

let ST = { day: 1, tp: DAILY_TP, leagueIdx: 0, round: 1, selectedTeamName: null, players: [], enemy: null, isLeagueCleared: false, isFailed: false, curProb: 0 };

// 개별 선수 등급 로직
function getPlayerGrade(stat) {
    if (stat >= 200) return 'SS';
    if (stat >= 160) return 'S';
    if (stat >= 120) return 'A';
    if (stat >= 80) return 'B';
    return 'C';
}

// 팀 종합 등급 로직
function getTeamGrade(stat) {
    if (stat >= 400) return 'SS';
    if (stat >= 320) return 'S';
    if (stat >= 240) return 'A';
    if (stat >= 160) return 'B';
    return 'C';
}

function init() {
    const grid = document.getElementById('teamGrid');
    grid.innerHTML = Object.keys(TEAMS_DATA).map(name => `<div class="list-item" id="team-${name}" onclick="ST.selectedTeamName='${name}'; renderSelection();"><b>${name}</b><span style="color:var(--accent); font-size:12px; font-weight:700;">${TEAMS_DATA[name].captain}</span></div>`).join('');
    const tMenu = document.getElementById('trainMenu');
    tMenu.innerHTML = TRAINS.map(t => `<div class="list-item" onclick="doTrain('${t.id}')"><div><div style="font-weight:800;">${t.name}</div><div style="font-size:11px; color:var(--text-dim);">${t.stats.join(', ')}</div></div><div style="color:var(--accent-bright); font-weight:900;">${t.cost}P</div></div>`).join('');
}

function renderSelection() {
    document.querySelectorAll('[id^="team-"]').forEach(el => el.style.borderColor = 'rgba(255,255,255,0.1)');
    document.getElementById(`team-${ST.selectedTeamName}`).style.borderColor = 'var(--accent)';
    document.getElementById('confirmBtn').style.display = 'block';
}

function confirmTeam() {
    const data = TEAMS_DATA[ST.selectedTeamName];
    const posSet = [{p:'공격수', s:['공격','속도','기술']},{p:'미드필더', s:['공격','협력','기술']},{p:'수비수', s:['수비','협력','체력']},{p:'골키퍼', s:['수비','체력','속도']}];
    ST.players = [data.captain, ...data.players].map((n, i) => ({ 
        name: n, pos: posSet[i].p, target: posSet[i].s, 
        stats: {'공격':40,'수비':40,'협력':40,'기술':40,'체력':40,'속도':40} 
    }));
    ST.enemy = LEAGUES[ST.leagueIdx].enemies[0];
    document.getElementById('selectionArea').style.display = 'none';
    document.getElementById('mainTabs').style.display = 'grid';
    document.getElementById('teamInfoArea').style.display = 'block';
    render();
}

function calculateTotals() {
    let totals = { '공격':0,'수비':0,'협력':0,'기술':0,'체력':0,'속도':0 };
    ST.players.forEach(p => { p.target.forEach(s => { totals[s] += p.stats[s]; }); });
    const S = Object.values(totals).reduce((a,b)=>a+b, 0);
    return { totals, S };
}

function render() {
    if (!ST.players.length) return;
    const { totals, S } = calculateTotals();
    const league = LEAGUES[ST.leagueIdx];
    
    document.getElementById('dayLabel').innerText = `${ST.day}일차`;
    document.getElementById('weekLabel').innerText = `${Math.floor((ST.day-1)/7)+1}주차`;
    document.getElementById('tpLabel').innerText = ST.tp;
    document.getElementById('totalStatsTextProfile').innerText = S;
    document.getElementById('totalStatsTextTrain').innerText = S;
    document.getElementById('myTeamLabel').innerText = ST.selectedTeamName;
    document.getElementById('enemyTeamLabel').innerText = ST.enemy;
    document.getElementById('leagueName').innerText = league.name;
    
    const pListUI = document.getElementById('playerListUI');
    pListUI.innerHTML = ST.players.map(p => {
        const statsHtml = p.target.map(s => {
            const grade = getPlayerGrade(p.stats[s]);
            const isMax = p.stats[s] >= MAX_STAT;
            return `<div class="p-stat-item ${isMax ? 'max' : ''}">
                        <span>${s} <small style="font-size:9px; opacity:0.6;">[${grade}]</small></span> 
                        <b>${Math.floor(p.stats[s])}</b>
                    </div>`;
        }).join('');
        return `<div class="player-item"><div class="p-pos">${p.pos}</div><div class="p-name">${p.name}</div><div class="p-stat-grid">${statsHtml}</div></div>`;
    }).join('');
    
    drawRadar('radarSvgProfile', totals);
    drawRadar('radarSvgTrain', totals);
    
    const progress = document.getElementById('connectorProgress');
    let progressVal = 0;
    for(let i=1; i<=4; i++){
        const node = document.getElementById(`node-${i}`);
        node.className = 'bracket-node';
        if(i < ST.round) { node.classList.add('complete'); progressVal = (i / 3) * 100; }
        else if(i === ST.round && !ST.isLeagueCleared) { node.classList.add('active'); }
        if(ST.isLeagueCleared && i === 4) { node.classList.add('complete'); progressVal = 100; }
    }
    progress.style.width = `${progressVal}%`;
    
    const mCard = document.getElementById('matchCard');
    const cMsg = document.getElementById('clearMsg');
    if (ST.isLeagueCleared) { mCard.style.display = 'none'; cMsg.style.display = 'block'; }
    else { mCard.style.display = 'block'; cMsg.style.display = 'none'; document.getElementById('matchBtn').disabled = ST.isFailed; document.getElementById('failMsg').style.display = ST.isFailed ? 'block' : 'none'; }
    
    const kr = [0, 1, 1.5, 2][ST.round];
    ST.curProb = (S < league.M) ? 0 : (S >= league.N) ? 100 : Math.pow((S - league.M) / (league.N - league.M), kr) * 100;
}

function showOverlay(title, sub, type) {
    const ov = document.getElementById('resOverlay');
    const t = document.getElementById('resTitle');
    const s = document.getElementById('resSub');
    t.className = "res-title";
    if(type === 'win') t.classList.add('win-text');
    else if(type === 'lose') t.classList.add('lose-text');
    else if(type === 'great') t.classList.add('great-text');
    t.innerText = title; s.innerText = sub; ov.classList.add('show');
}

// 고정 총량 균등 분배 훈련 로직
function doTrain(tid) {
    const t = TRAINS.find(x => x.id === tid);
    if (ST.tp < t.cost) return alert("훈련 포인트가 부족합니다!");

    const isGreat = Math.random() < 0.05; // 5% 확률 대성공
    
    // 기획서 기반: 성공 시 1인당 +5, 대성공 시 1인당 +10 기준
    // 팀 종합 스탯 상승 목표치 = (인당 상승량 * 담당자 2명 * 스탯 종류 수)
    const baseInc = isGreat ? 10 : 5;
    const totalTargetIncrease = baseInc * 2 * t.stats.length;
    
    let activeNodes = [];
    ST.players.forEach(p => {
        t.stats.forEach(s => {
            // 해당 선수가 담당하는 스탯이고, 아직 MAX(200)가 아닌 노드 추출
            if (p.target.includes(s) && p.stats[s] < MAX_STAT) {
                activeNodes.push({ p, s });
            }
        });
    });

    if (activeNodes.length === 0) return alert("해당 항목의 모든 스탯이 이미 최고치입니다!");

    // 균등 분배: 총 상승 목표치를 유효 노드 수로 나눔
    const perNodeInc = totalTargetIncrease / activeNodes.length;
    activeNodes.forEach(node => {
        node.p.stats[node.s] = Math.min(MAX_STAT, node.p.stats[node.s] + perNodeInc);
    });

    ST.tp -= t.cost;
    render();

    showOverlay(
        isGreat ? "✨ 대성공 !! ✨" : "훈련 성공", 
        isGreat ? `효율 폭발! 팀 전체 스탯 +${totalTargetIncrease} 상승!` : `무사히 마쳤습니다. 팀 전체 스탯 +${totalTargetIncrease} 상승!`, 
        isGreat ? 'great' : 'win'
    );
}

function playMatch() {
    if (ST.isFailed || ST.isLeagueCleared) return;
    document.getElementById('matchBtn').disabled = true;
    setTimeout(() => {
        if (Math.random() * 100 <= ST.curProb) {
            if (ST.round < 3) {
                ST.round++; ST.enemy = LEAGUES[ST.leagueIdx].enemies[ST.round-1];
                showOverlay("MATCH WIN", "승리하여 다음 라운드에 진출했습니다!", "win");
            } else {
                ST.isLeagueCleared = true;
                showOverlay("🏆 CHAMPION 🏆", `${LEAGUES[ST.leagueIdx].name} 정상에 등극했습니다!`, "great");
            }
        } else {
            ST.isFailed = true;
            showOverlay("MATCH LOSS", "아쉽게 패배했습니다. 전력을 보강하세요.", "lose");
        }
        render();
    }, 600);
}

function nextDay() {
    if (ST.day >= 70) return alert("시즌 종료");
    ST.day++;
    ST.tp += DAILY_TP; // 매일 40P 충전
    if (ST.isFailed) { ST.isFailed = false; ST.round = 1; ST.enemy = LEAGUES[ST.leagueIdx].enemies[0]; }
    else if (ST.isLeagueCleared && ST.leagueIdx < 3) { ST.leagueIdx++; ST.round = 1; ST.isLeagueCleared = false; ST.enemy = LEAGUES[ST.leagueIdx].enemies[0]; }
    render();
}

function drawRadar(id, totals) {
    const svg = document.getElementById(id);
    const labels = ['공격','수비','협력','기술','체력','속도'];
    const pts = labels.map((k, i) => {
        const a = (Math.PI * 2 * i / 6) - (Math.PI / 2);
        const val = Math.min(TEAM_MAX_STAT, totals[k]);
        const radius = (75 * val / TEAM_MAX_STAT); 
        return `${100 + radius * Math.cos(a)},${100 + radius * Math.sin(a)}`;
    }).join(' ');

    svg.innerHTML = `
        <circle cx="100" cy="100" r="75" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
        <polygon points="${pts}" fill="rgba(212,173,106,0.3)" stroke="var(--accent)" stroke-width="2"/>
        ${labels.map((k, i) => { 
            const a = (Math.PI * 2 * i / 6) - (Math.PI / 2); 
            const grade = getTeamGrade(totals[k]);
            return `<text x="${100 + 92 * Math.cos(a)}" y="${100 + 92 * Math.sin(a)}" fill="#888" font-size="10" text-anchor="middle" dominant-baseline="middle">${k}[${grade}]</text>`; 
        }).join('')}
    `;
}

function switchTab(id, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById(`panel-${id}`).classList.add('active');
    render();
}

window.onload = init;
</script>
