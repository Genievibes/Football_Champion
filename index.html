<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아크라시아 풋볼 챔피언</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #05070a;
            --card-bg: rgba(15, 20, 30, 0.95);
            --accent: #d4ad6a;
            --accent-bright: #f5c842;
            --text-main: #e8eaf0;
            --text-dim: #9ca3af;
            --error: #ff4d4d;
            --win: #2ecc71;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-dark); color: var(--text-main); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; overflow-x: hidden; }
        #app { max-width: 500px; margin: 0 auto; position: relative; padding-bottom: 40px; }

        .top-util { display: flex; justify-content: space-between; padding: 15px 20px; align-items: center; gap: 10px; }
        .status-badges { display: flex; gap: 8px; }
        .day-badge { background: rgba(212, 173, 106, 0.1); padding: 5px 12px; border-radius: 6px; border: 1px solid var(--accent); color: var(--accent); font-weight: 800; font-size: 13px; }
        .next-day-btn { background: var(--accent); color: #000; padding: 6px 14px; border-radius: 6px; border: none; font-weight: 800; cursor: pointer; font-size: 13px; }

        .header { text-align: center; padding: 20px 20px 10px; }
        .event-badge { display: inline-block; font-size: 11px; font-weight: 800; letter-spacing: 1px; padding: 4px 14px; border-radius: 4px; margin-bottom: 12px; background: var(--accent); color: #000; }
        h1 { font-size: 22px; font-weight: 900; color: #fff; }

        .tabs { display: grid; grid-template-columns: repeat(3, 1fr); margin: 15px 16px; background: rgba(255,255,255,0.05); border-radius: 12px; padding: 4px; }
        .tab-btn { background: transparent; border: none; padding: 12px; color: var(--text-dim); font-weight: 700; font-size: 13px; cursor: pointer; }
        .tab-btn.active { background: var(--accent); color: #000; border-radius: 8px; }

        .panel { display: none; padding: 0 16px; animation: fadeIn 0.3s ease-out; }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card-bg); border: 1px solid rgba(212, 173, 106, 0.2); border-radius: 20px; padding: 20px; margin-bottom: 16px; position: relative; }
        .card-title-sub { font-size: 12px; font-weight: 800; color: var(--text-dim); margin-bottom: 15px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; }

        .train-status-bar { display: flex; justify-content: center; gap: 15px; margin-top: 12px; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 12px; }
        .status-item { text-align: center; }
        .status-label { font-size: 11px; color: var(--text-dim); display: block; margin-bottom: 2px; }
        .status-value { font-size: 16px; font-weight: 900; color: var(--accent); }

        .player-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .player-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 12px; }
        .p-name { font-size: 14px; font-weight: 900; margin-bottom: 6px; }
        .p-stat-grid { display: flex; flex-direction: column; gap: 4px; font-size: 11px; }
        .p-stat-item { display: flex; justify-content: space-between; color: var(--accent-bright); }
        .p-stat-item.max { color: var(--error); font-weight: 800; }

        .btn { width: 100%; padding: 16px; border-radius: 14px; font-weight: 800; border: none; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .btn-primary { background: linear-gradient(135deg, var(--accent), #b89156); color: #000; }
        .btn:disabled { background: #222 !important; color: #555 !important; cursor: not-allowed; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(10px); cursor: pointer; }
        .overlay.show { display: flex; }
        .res-title { font-size: 36px; font-weight: 900; margin-bottom: 10px; text-align: center; width: 90%; }
        .res-sub { font-size: 17px; font-weight: 700; color: var(--text-dim); text-align: center; max-width: 85%; line-height: 1.6; }
        .great-text { color: var(--accent-bright); text-shadow: 0 0 30px rgba(245, 200, 66, 0.8); animation: pulse 0.6s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        .list-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 16px; border-radius: 14px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="resOverlay" class="overlay" onclick="this.classList.remove('show')">
        <div id="resTitle" class="res-title"></div>
        <div id="resSub" class="res-sub"></div>
    </div>

    <div id="app">
        <div class="top-util">
            <div class="status-badges">
                <div class="day-badge" id="dayLabel">1일차</div>
                <div class="day-badge" id="weekLabel" style="border-color:var(--accent-bright); color:var(--accent-bright);">1주차</div>
            </div>
            <button class="next-day-btn" onclick="nextDay()">다음 날로 ➔</button>
        </div>

        <div class="header">
            <div class="event-badge">SEASON 2026</div>
            <h1>아크라시아 풋볼 챔피언</h1>
        </div>

        <div id="mainTabs" class="tabs" style="display:none;">
            <button class="tab-btn active" onclick="switchTab('profile', this)">팀 관리</button>
            <button class="tab-btn" onclick="switchTab('training', this)">훈련</button>
            <button class="tab-btn" onclick="switchTab('match', this)">대회</button>
        </div>

        <div class="panel active" id="panel-profile">
            <div id="selectionArea">
                <div class="card-title-sub">원정대 팀 선택</div>
                <div id="teamGrid"></div>
                <button class="btn btn-primary" id="confirmBtn" onclick="confirmTeam()" style="display:none; margin-top:10px;">팀 계약 체결</button>
            </div>
            <div id="teamInfoArea" style="display:none;">
                <div class="card" style="text-align:center;">
                    <div class="card-title-sub">📊 팀 종합 실력</div>
                    <div class="radar-box"><svg id="radarSvgProfile" width="200" height="200" viewBox="0 0 200 200"></svg></div>
                    <div id="totalStatsTextProfile" style="font-size:18px; margin-top:15px; color:var(--accent-bright); font-weight:900;"></div>
                </div>
                <div class="card">
                    <div class="card-title-sub">👥 선수 스탯 현황</div>
                    <div id="playerListUI" class="player-list"></div>
                </div>
            </div>
        </div>

        <div class="panel" id="panel-training">
            <div class="card" style="text-align:center;">
                <div class="card-title-sub">성장 그래프</div>
                <div class="radar-box"><svg id="radarSvgTrain" width="200" height="200" viewBox="0 0 200 200"></svg></div>
                <div class="train-status-bar">
                    <div class="status-item"><span class="status-label">보유 포인트</span><span id="tpLabel" class="status-value">0</span><span style="font-size:12px; color:var(--accent);">P</span></div>
                    <div class="status-item"><span class="status-label">팀 전체 스탯</span><span id="totalStatsTextTrain" class="status-value">0</span></div>
                </div>
            </div>
            <div id="trainMenu"></div>
        </div>

        <div class="panel" id="panel-match">
            <div class="card" style="text-align:center;">
                <span id="leagueName" style="color:var(--accent-bright); font-weight:900; font-size:20px; display:block; margin-bottom:5px;">기다려 주세요...</span>
                <div id="roundLabel" style="font-size:14px; color:var(--text-dim);">준비 중</div>
            </div>
            <div id="matchCard" class="card" style="text-align:center;">
                <div id="myTeamLabel" style="font-weight:900; font-size:18px;">-</div>
                <div style="color:var(--accent); font-weight:900; margin:15px 0; font-size:20px;">VS</div>
                <div id="enemyTeamLabel" style="font-weight:900; color:var(--error); font-size:18px;">-</div>
                <div id="winProbLabel" style="margin-top:15px; font-size:13px; color:var(--accent-bright); font-weight:700;">승률 예상: 0%</div>
                <button id="matchBtn" class="btn btn-primary" onclick="playMatch()" style="margin-top:20px;">경기 시작</button>
                <div id="matchStatusMsg" style="display:none; margin-top:10px; color:var(--error); font-weight:700;"></div>
            </div>
        </div>
    </div>

<script>
const MAX_STAT = 400;
const TRAINS = [
    { id:'t1', name:"체력 훈련", cost:20, stats:['체력','속도'] },
    { id:'t2', name:"전술 훈련", cost:20, stats:['수비','협력'] },
    { id:'t3', name:"슈팅 훈련", cost:20, stats:['공격','기술'] },
    { id:'t4', name:"단체 명상", cost:30, stats:['수비','체력','속도'] },
    { id:'t5', name:"비디오 분석", cost:30, stats:['공격','협력','기술'] },
    { id:'t6', name:"전문 코치 초청 강의", cost:60, stats:['공격','수비','협력','기술','체력','속도'] }
];

const LEAGUES = [
    { name: "1차 예선", M: 480, N: 960, enemies: ["레온하트 네리아", "슈테른 네리아", "칸다리아 네리아"] },
    { name: "2차 예선", M: 960, N: 1440, enemies: ["판다 푸푸", "나루니", "코니"] },
    { name: "3차 예선", M: 1440, N: 1920, enemies: ["발탄", "비아키스", "카멘"] },
    { name: "아크라시아 컵", M: 2200, N: 2400, enemies: ["니나브", "카단", "실리안"] }
];

let ST = { 
    day: 1, tp: 100, leagueIdx: 0, round: 1, 
    players: [], selectedTeamName: null, enemy: '',
    isFailed: false, isLeagueCleared: false
};

function init() {
    const grid = document.getElementById('teamGrid');
    const teams = ["베른 유나이티드", "아르데타인 스틸러스", "루테란 FC", "엘가시아 CF", "SSC 볼다이크"];
    grid.innerHTML = teams.map(name => `<div class="list-item" onclick="ST.selectedTeamName='${name}'; renderSelection();"><b>${name}</b></div>`).join('');
    
    const tMenu = document.getElementById('trainMenu');
    tMenu.innerHTML = TRAINS.map(t => `<div class="list-item" onclick="doTrain('${t.id}')"><div><div style="font-weight:800;">${t.name}</div><div style="font-size:11px; color:var(--text-dim);">${t.stats.join(', ')}</div></div><div style="color:var(--accent-bright); font-weight:900;">${t.cost}P</div></div>`).join('');
}

function renderSelection() { 
    document.querySelectorAll('[onclick*="selectedTeamName"]').forEach(el => el.style.borderColor = 'rgba(255,255,255,0.1)');
    document.getElementById('confirmBtn').style.display = 'block'; 
}

function confirmTeam() {
    const names = ["가디언 슬레이어", "실마엘 혈투사", "군단장 토벌자", "운명의 부름"];
    const targets = [['공격','속도','기술'],['공격','협력','기술'],['수비','협력','체력'],['수비','체력','속도']];
    ST.players = names.map((n, i) => ({ name: n, target: targets[i], stats: {'공격':40,'수비':40,'협력':40,'기술':40,'체력':40,'속도':40} }));
    
    // 초기 상대팀 설정 필수
    ST.enemy = LEAGUES[ST.leagueIdx].enemies[0];
    
    document.getElementById('selectionArea').style.display = 'none';
    document.getElementById('mainTabs').style.display = 'grid';
    document.getElementById('teamInfoArea').style.display = 'block';
    render();
}

function calculateTotals() {
    let totals = { '공격':0,'수비':0,'협력':0,'기술':0,'체력':0,'속도':0 };
    ST.players.forEach(p => { p.target.forEach(s => { totals[s] += p.stats[s]; }); });
    return { totals, S: Object.values(totals).reduce((a,b)=>a+b, 0) };
}

function render() {
    if (!ST.players.length) return;
    const { totals, S } = calculateTotals();
    const league = LEAGUES[ST.leagueIdx];
    
    document.getElementById('dayLabel').innerText = `${ST.day}일차`;
    document.getElementById('tpLabel').innerText = ST.tp;
    document.getElementById('totalStatsTextProfile').innerText = `총합: ${S}`;
    document.getElementById('totalStatsTextTrain').innerText = S;
    
    // 대회 화면 데이터 매핑
    document.getElementById('leagueName').innerText = league.name;
    document.getElementById('roundLabel').innerText = ST.isLeagueCleared ? "🏆 리그 정복" : (ST.round === 1 ? "8강전" : ST.round === 2 ? "4강전" : "결승전");
    document.getElementById('myTeamLabel').innerText = ST.selectedTeamName;
    document.getElementById('enemyTeamLabel').innerText = ST.isLeagueCleared ? "적수가 없음" : ST.enemy;

    // 승률 계산 로직
    const kr = [0, 1, 1.5, 2][ST.round];
    let prob = (S < league.M) ? 0 : (S >= league.N) ? 100 : Math.pow((S - league.M) / (league.N - league.M), kr) * 100;
    document.getElementById('winProbLabel').innerText = ST.isLeagueCleared ? "최강의 팀!" : `승률 예상: ${Math.floor(prob)}%`;

    const mBtn = document.getElementById('matchBtn');
    const mMsg = document.getElementById('matchStatusMsg');
    
    if (ST.isFailed) {
        mBtn.disabled = true;
        mMsg.style.display = 'block';
        mMsg.innerText = "패배했습니다. 다음 날 재도전 하세요.";
    } else if (ST.isLeagueCleared) {
        mBtn.disabled = true;
        mMsg.style.display = 'block';
        mMsg.innerText = "이 리그의 우승자입니다!";
    } else {
        mBtn.disabled = false;
        mMsg.style.display = 'none';
    }

    const pListUI = document.getElementById('playerListUI');
    pListUI.innerHTML = ST.players.map(p => {
        const statsHtml = p.target.map(s => `<div class="p-stat-item ${p.stats[s]>=MAX_STAT?'max':''}"><span>${s}</span> <b>${p.stats[s]}</b></div>`).join('');
        return `<div class="player-item"><div class="p-name" style="color:var(--accent);">${p.name}</div><div class="p-stat-grid">${statsHtml}</div></div>`;
    }).join('');
    
    drawRadar('radarSvgProfile', totals);
    drawRadar('radarSvgTrain', totals);
}

function showOverlay(title, sub, type) {
    const ov = document.getElementById('resOverlay');
    const t = document.getElementById('resTitle');
    const s = document.getElementById('resSub');
    t.className = "res-title";
    if(type === 'great') t.classList.add('great-text');
    else t.style.color = type === 'win' ? "var(--win)" : "var(--error)";
    t.innerText = title; s.innerText = sub; ov.classList.add('show');
}

function doTrain(tid) {
    const t = TRAINS.find(x => x.id === tid);
    if (ST.tp < t.cost) return alert("포인트가 부족합니다!");

    const allStats = ['공격','수비','협력','기술','체력','속도'];
    const isTotalAllMax = allStats.every(s => ST.players.every(p => p.stats[s] >= MAX_STAT));
    if (isTotalAllMax) return alert("모든 성장이 완료되었습니다. 어느 팀도 두렵지 않습니다!");

    const maxStats = t.stats.filter(s => ST.players.every(p => p.stats[s] >= MAX_STAT));
    const activeStats = t.stats.filter(s => !maxStats.includes(s));

    if (activeStats.length === 0) return alert(`성장 완료! (${maxStats.join(', ')})이 최고치에 도달하여 다른 훈련이 필요합니다!`);

    const isGreat = Math.random() < 0.05;
    const incPerStat = (isGreat ? 10 : 5) * t.stats.length / activeStats.length; 

    ST.players.forEach(p => activeStats.forEach(s => p.stats[s] = Math.min(MAX_STAT, p.stats[s] + incPerStat)));
    ST.tp -= t.cost;
    render();

    if (maxStats.length > 0) {
        showOverlay(isGreat ? "✨ 대성공 !! ✨" : "훈련 성공", `성장 집중! (${maxStats.join(', ')})이 최고치라 (${activeStats.join(', ')})에 화력이 집중되었습니다! (각 +${incPerStat})`, isGreat ? 'great' : 'win');
    } else {
        showOverlay(isGreat ? "✨ 대성공 !! ✨" : "훈련 성공", `훈련을 통해 선수들이 성장했습니다! (각 +${incPerStat})`, isGreat ? 'great' : 'win');
    }
}

function playMatch() {
    if (ST.isFailed || ST.isLeagueCleared) return;
    
    const { S } = calculateTotals();
    const league = LEAGUES[ST.leagueIdx];
    const kr = [0, 1, 1.5, 2][ST.round]; 
    let winProb = (S < league.M) ? 0 : (S >= league.N) ? 100 : Math.pow((S - league.M) / (league.N - league.M), kr) * 100;

    if (Math.random() * 100 <= winProb) {
        if (ST.round < 3) {
            ST.round++;
            ST.enemy = league.enemies[ST.round - 1];
            showOverlay("MATCH WIN", "승리! 다음 라운드로 향합니다.", "win");
        } else {
            ST.isLeagueCleared = true;
            showOverlay("🏆 CHAMPION 🏆", `${league.name} 우승컵을 들어올렸습니다!`, "great");
        }
    } else {
        ST.isFailed = true;
        showOverlay("MATCH LOSS", "아쉬운 패배입니다. 내일 다시 도전하세요.", "lose");
    }
    render();
}

function nextDay() {
    ST.day++; ST.tp += 100;
    if (ST.isFailed) { ST.isFailed = false; ST.round = 1; ST.enemy = LEAGUES[ST.leagueIdx].enemies[0]; } 
    else if (ST.isLeagueCleared && ST.leagueIdx < 3) { ST.leagueIdx++; ST.round = 1; ST.isLeagueCleared = false; ST.enemy = LEAGUES[ST.leagueIdx].enemies[0]; }
    render();
}

function drawRadar(id, totals) {
    const svg = document.getElementById(id);
    const labels = ['공격','수비','협력','기술','체력','속도'];
    const pts = labels.map((k, i) => {
        const a = (Math.PI * 2 * i / 6) - (Math.PI / 2);
        const val = Math.min(400, totals[k] || 0);
        return `${100 + (75 * val / 400) * Math.cos(a)},${100 + (75 * val / 400) * Math.sin(a)}`;
    }).join(' ');
    svg.innerHTML = `<circle cx="100" cy="100" r="75" fill="none" stroke="rgba(255,255,255,0.1)"/><polygon points="${pts}" fill="rgba(212,173,106,0.3)" stroke="var(--accent)" stroke-width="2"/>${labels.map((k, i) => { const a = (Math.PI * 2 * i / 6) - (Math.PI / 2); return `<text x="${100 + 88 * Math.cos(a)}" y="${100 + 88 * Math.sin(a)}" fill="#777" font-size="9" text-anchor="middle" dominant-baseline="middle">${k}</text>`; }).join('')}`;
}

function switchTab(id, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById(`panel-${id}`).classList.add('active');
    render();
}

window.onload = init;
</script>
</body>
</html>
